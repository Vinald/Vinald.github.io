name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Inject EmailJS configuration
        run: |
          cat > assets/emailjs-config.js << 'EOF'
          /**
           * EmailJS Configuration - Auto-injected by GitHub Actions
           * DO NOT EDIT THIS FILE MANUALLY
           */
          
          // EmailJS credentials injected from GitHub Secrets
          window.EMAILJS_PUBLIC_KEY = "${{ secrets.EMAILJS_PUBLIC_KEY }}";
          window.EMAILJS_SERVICE_ID = "${{ secrets.EMAILJS_SERVICE_ID }}";
          window.EMAILJS_TEMPLATE_ID = "${{ secrets.EMAILJS_TEMPLATE_ID }}";
          
          // Verification
          console.log('EmailJS configuration loaded');
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
