name: Inject Secrets and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Inject EmailJS secrets into index.html
      run: |
        # Create the secrets script content
        SECRETS_SCRIPT="<script>window.EMAILJS_PUBLIC_KEY=\"${{ secrets.EMAILJS_PUBLIC_KEY }}\";window.EMAILJS_SERVICE_ID=\"${{ secrets.EMAILJS_SERVICE_ID }}\";window.EMAILJS_TEMPLATE_ID=\"${{ secrets.EMAILJS_TEMPLATE_ID }}\";</script>"
        
        # Replace the closing body tag with secrets script + closing body tag
        sed -i "s|</body>|${SECRETS_SCRIPT}</body>|g" index.html
        
        # Verify injection
        echo "=== Checking injection ==="
        grep -c "EMAILJS_PUBLIC_KEY" index.html && echo "✓ Secrets injected successfully" || echo "✗ WARNING: Secrets not found"
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
