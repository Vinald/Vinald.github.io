name: Inject Secrets and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Inject EmailJS secrets
      run: |
        # Create emailjs-config.js with secrets from GitHub Secrets
        cat > assets/emailjs-config.js << 'EOF'
        /**
         * EmailJS Configuration - Auto-injected by GitHub Actions
         * DO NOT EDIT THIS FILE MANUALLY
         */
        
        // EmailJS credentials injected from GitHub Secrets
        window.EMAILJS_PUBLIC_KEY = "${{ secrets.EMAILJS_PUBLIC_KEY }}";
        window.EMAILJS_SERVICE_ID = "${{ secrets.EMAILJS_SERVICE_ID }}";
        window.EMAILJS_TEMPLATE_ID = "${{ secrets.EMAILJS_TEMPLATE_ID }}";
        
        // Verification
        console.log('EmailJS configuration loaded successfully');
        EOF
        
        # Verify injection
        echo "=== Checking injection ==="
        if grep -q "EMAILJS_PUBLIC_KEY" assets/emailjs-config.js && [ ! -z "${{ secrets.EMAILJS_PUBLIC_KEY }}" ]; then
          echo "✓ Secrets injected successfully"
        else
          echo "✗ WARNING: Secrets might not be properly injected"
        fi
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
