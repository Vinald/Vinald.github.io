name: Inject Secrets and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Inject EmailJS secrets
      run: |
        # Create emailjs-config.js with secrets from GitHub Secrets
        cat > assets/emailjs-config.js << 'EOF'
        /**
         * EmailJS Configuration - Auto-injected by GitHub Actions
         * DO NOT EDIT THIS FILE MANUALLY
         */

        // EmailJS credentials injected from GitHub Secrets
        window.EMAILJS_PUBLIC_KEY  = "${{ secrets.EMAILJS_PUBLIC_KEY }}";
        window.EMAILJS_SERVICE_ID  = "${{ secrets.EMAILJS_SERVICE_ID }}";
        window.EMAILJS_TEMPLATE_ID = "${{ secrets.EMAILJS_TEMPLATE_ID }}";

        // Debug: Log which credentials are set
        (function() {
          const hasPublicKey  = window.EMAILJS_PUBLIC_KEY && window.EMAILJS_PUBLIC_KEY.length > 0;
          const hasServiceId  = window.EMAILJS_SERVICE_ID && window.EMAILJS_SERVICE_ID.length > 0;
          const hasTemplateId = window.EMAILJS_TEMPLATE_ID && window.EMAILJS_TEMPLATE_ID.length > 0;

          console.log('=== EmailJS Configuration Status ===');
          console.log('Public Key:', hasPublicKey ? '✓ Loaded' : '✗ Missing');
          console.log('Service ID:', hasServiceId ? '✓ Loaded' : '✗ Missing');
          console.log('Template ID:', hasTemplateId ? '✓ Loaded' : '✗ Missing');
        })();
        EOF

        # Verify injection - check file was created and has content
        echo "=== Verifying EmailJS Configuration Injection ==="
        if [ -f assets/emailjs-config.js ]; then
          echo "✓ File created: assets/emailjs-config.js"
          FILE_SIZE=$(wc -c < assets/emailjs-config.js)
          echo "✓ Configuration file size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 200 ]; then
            echo "⚠️  WARNING: File seems small, secrets might not be injected"
          fi
        else
          echo "✗ ERROR: Failed to create emailjs-config.js"
          exit 1
        fi

        # Check if secrets are available
        if [ -z "${{ secrets.EMAILJS_PUBLIC_KEY }}" ]; then
          echo "⚠️  WARNING: EMAILJS_PUBLIC_KEY secret is empty or not set"
        else
          echo "✓ EMAILJS_PUBLIC_KEY is set"
        fi
        if [ -z "${{ secrets.EMAILJS_SERVICE_ID }}" ]; then
          echo "⚠️  WARNING: EMAILJS_SERVICE_ID secret is empty or not set"
        else
          echo "✓ EMAILJS_SERVICE_ID is set"
        fi
        if [ -z "${{ secrets.EMAILJS_TEMPLATE_ID }}" ]; then
          echo "⚠️  WARNING: EMAILJS_TEMPLATE_ID secret is empty or not set"
        else
          echo "✓ EMAILJS_TEMPLATE_ID is set"
        fi
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
