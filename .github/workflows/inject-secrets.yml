name: Inject Secrets and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Create secrets injection script
      run: |
        cat > /tmp/inject-secrets.js << 'EOF'
        window.EMAILJS_PUBLIC_KEY = "${{ secrets.EMAILJS_PUBLIC_KEY }}";
        window.EMAILJS_SERVICE_ID = "${{ secrets.EMAILJS_SERVICE_ID }}";
        window.EMAILJS_TEMPLATE_ID = "${{ secrets.EMAILJS_TEMPLATE_ID }}";
        EOF
        
        # Create assets directory if it doesn't exist
        mkdir -p assets
        
        # Copy the secrets file to assets
        cp /tmp/inject-secrets.js assets/inject-secrets.js
    
    - name: Inject secrets into index.html
      run: |
        # Add script tag to load secrets before script.js in index.html
        sed -i 's|<script src="assets/script.js"></script>|<script src="assets/inject-secrets.js"></script>\n        <script src="assets/script.js"></script>|g' index.html
    
    - name: Verify injection
      run: |
        echo "=== Checking if secrets were injected ==="
        grep -n "inject-secrets.js" index.html || echo "WARNING: inject-secrets.js not found in index.html"
        echo "=== Last 30 lines of index.html ==="
        tail -30 index.html
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
